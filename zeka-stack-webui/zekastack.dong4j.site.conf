# 限制请求速率配置
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=feedback_limit:10m rate=5r/s;

# 限制连接数配置（若全局已定义请保留全局配置）
# limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# HTTP 自动跳转到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name zekastack.dong4j.site;

    # 允许 Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务
upstream zeka_stack_api {
    server 2.0.0.5:8080;
    keepalive 128;
    keepalive_timeout 75;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zekastack.dong4j.site;

    # 隐藏 nginx 版本号
    server_tokens off;

    # SSL 证书配置
    ssl_certificate /etc/nginx/encrypt/site/fullchain.pem;
    ssl_certificate_key /etc/nginx/encrypt/site/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    # 使用不同的共享内存区域名称，避免与全局配置冲突
    # 如果全局配置已定义 SSL session cache，可以注释掉下面两行
    # ssl_session_cache shared:SSL_SPRING_AI:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling（如果证书支持）
    # 如果证书链文件不存在，请注释掉以下配置
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/encrypt/chain.pem;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # WebUI 根目录
    root /var/www/zeka-stack-webui/dist;
    index index.html;

    # 日志配置
    access_log /var/log/nginx/zekastack-access.log;
    error_log /var/log/nginx/zekastack-error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/x-icon;

    # Brotli 压缩（如果已安装 nginx-module-brotli）
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # VitePress 资源文件（带 hash 的文件名可以长期缓存）
    location ~* \.(js|css|woff|woff2|ttf|eot|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 插件版本接口
    location = /api/plugin/version {
        add_header Content-Type application/json always;
        return 200 "2025.3.1200";
    }

    # 细粒度 API 限流与方法限制
    location = /api/plugin/feedback/discussion {
        limit_req zone=feedback_limit burst=10 nodelay;
        if ($request_method !~ ^(POST|OPTIONS)$) {
            return 405;
        }

        proxy_pass http://zeka_stack_api/api/plugin/feedback/discussion;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location = /api/plugin/feedback/issue {
        limit_req zone=feedback_limit burst=10 nodelay;
        if ($request_method !~ ^(POST|OPTIONS)$) {
            return 405;
        }

        proxy_pass http://zeka_stack_api/api/plugin/feedback/issue;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location ~ ^/api/plugin/model/(.+)$ {
        limit_req zone=api_limit burst=20 nodelay;
        if ($request_method !~ ^(GET|OPTIONS)$) {
            return 405;
        }

        proxy_pass http://zeka_stack_api/api/plugin/v1/models/$1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location = /api/plugin/events {
        if ($request_method !~ ^(POST|OPTIONS)$) {
            return 405;
        }

        proxy_pass http://zeka_stack_api/api/plugin/events;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # API 代理（后端有 /api 前缀）
    location ^~ /api/ {
        proxy_pass http://zeka_stack_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 文档站点
    location ^~ /docs/ {
        alias /var/www/zeka-stack/dist/;
        try_files $uri $uri/ /index.html;
    }

    # WebUI 主页面和路由
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 优化文件上传大小限制
    client_max_body_size 10M;

    # 限制连接数
    limit_conn conn_limit_per_ip 20;

    # 超时设置
    keepalive_timeout 65;
    send_timeout 60;
    client_body_timeout 60;
    client_header_timeout 60;

    # 缓冲区设置
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    output_buffers 1 32k;
    postpone_output 1460;
}
