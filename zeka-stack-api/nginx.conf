# 限制请求速率配置
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=feedback_limit:10m rate=5r/s;

# 限制连接数配置
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

upstream zeka-stack-api {
    server 2.0.0.5:8080;
    keepalive 128;
    keepalive_timeout 75;
}

server {
    # 监听 HTTP 并重定向到 HTTPS
    listen 80;
    server_name api.xxx.site;

    # 隐藏 nginx 版本号
    server_tokens off;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    return 301 https://$host$request_uri;
}

server {
    # 监听 HTTPS
    listen 443 ssl http2;
    server_name api.xxx.site;

    # 隐藏 nginx 版本号
    server_tokens off;

    # SSL 配置
    ssl_certificate /etc/nginx/encrypt/site/fullchain.pem;
    ssl_certificate_key /etc/nginx/encrypt/site/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # 限制请求体大小（防止文件上传过大）
    client_max_body_size 10m;

    # 限制连接数
    limit_conn conn_limit_per_ip 20;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # 日志配置
    access_log /var/log/nginx/api.xxx.site_access.log;
    error_log /var/log/nginx/api.xxx.site_error.log;

    # 只允许必要的 HTTP 方法
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # https://api.dong4j.site/plugin/feedback
    location = /plugin/feedback {
        # 限制请求速率
        limit_req zone=feedback_limit burst=10 nodelay;

        # 只允许 POST 方法
        if ($request_method !~ ^(POST|OPTIONS)$) {
            return 405;
        }

        proxy_pass http://zeka-stack-api/api/plugin/feedback;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # 代理超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # https://api.dong4j.site/plugin/model/{provider}
    location ~ ^/plugin/model/(.+)$ {
        # 限制请求速率
        limit_req zone=api_limit burst=20 nodelay;

        # 只允许 GET 方法
        if ($request_method !~ ^(GET|OPTIONS)$) {
            return 405;
        }

        proxy_pass http://zeka-stack-api/api/plugin/v1/models/$1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # 代理超时设置
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # https://api.dong4j.site/plugin/events
    location = /plugin/events {

        # 只允许 POST 方法
        if ($request_method !~ ^(POST|OPTIONS)$) {
            return 405;
        }

        proxy_pass http://zeka-stack-api/api/plugin/events;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # 代理超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问常见敏感文件
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

}
