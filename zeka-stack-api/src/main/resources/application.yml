server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: zeka-stack-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.31.5:3306/zeka-stack-helper?useUnicode=true&characterEncoding=utf8&useSSL=false&allowMultiQueries=true&serverTimezone=GMT%2b8
    username: root
    password: rootpassword

logging:
  level:
    root: INFO
    dev.dong4j.zeka.stack.api: DEBUG

app:
  proxy:
    enabled: ${APP_PROXY_ENABLED:false}
    host: ${APP_PROXY_HOST:127.0.0.1}
    port: ${APP_PROXY_PORT:7890}

zhipu:
  api:
    base-url: https://open.bigmodel.cn/api/paas/v4
    models-url: ${zhipu.api.base-url}/models
  # 默认模型列表（当 API 获取失败时使用）
  default-models:
    - glm-4.7
    - glm-4.6
    - glm-4.5
    - glm-4.5-air
    - glm-4.5-x
    - glm-4.5-airx
    - glm-4.5-flash
    - glm-4-plus
    - glm-4-air-250414
    - glm-4-airx
    - glm-4-flashx
    - glm-4-flashx-250414

github:
  token: ${ZEKA_STACK_PLUGIN_GITHUB_TOKEN:}
  repository-id: ${GITHUB_REPOSITORY_ID:R_kgDOO3uf9g}
  repository: ${GITHUB_REPOSITORY:zeka-stack/zeka-idea-plugin}
  category:
    general: ${GITHUB_CATEGORY_ID_GENERAL:DIC_kwDOO3uf9s4C0Jcg}
    ideas: ${GITHUB_CATEGORY_ID_IDEAS:DIC_kwDOO3uf9s4C0Jci}
    qa: ${GITHUB_CATEGORY_ID_QA:DIC_kwDOO3uf9s4C0Jch}
    announcements: ${GITHUB_CATEGORY_ID_ANNOUNCEMENTS:DIC_kwDOO3uf9s4C0Jcf}

oauth:
  github:
    client-id: ${ZEKA_STACK_GITHUB_CLIENT_ID:}
    client-secret: ${ZEKA_STACK_GITHUB_CLIENT_SECRET:}
    redirect-uri: ${ZEKA_STACK_GITHUB_REDIRECT_URI:https://zekastack.dong4j.site/api/oauth/github/callback}
    success-redirect: ${ZEKA_STACK_GITHUB_SUCCESS_REDIRECT:https://zekastack.dong4j.site/#/login}
    failure-redirect: ${ZEKA_STACK_GITHUB_FAILURE_REDIRECT:https://zekastack.dong4j.site/#/login}
    session-days: ${ZEKA_STACK_GITHUB_SESSION_DAYS:30}
